name: Automated API Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman

    - name: Run Postman Collection
      run: |
        newman run restful-booker-postman-happy-path-collection.json \
          -e restful-booker-postman-collection.json \
          --env-var "username=${{ secrets.BOOKING_USER }}" \
          --env-var "password=${{ secrets.BOOKING_PASSWORD }}" \
          --reporters cli,text \
          --reporter-text-export test-results.txt
    
    - name: Read Test Results
      id: results
      if: always()
      run: |
        cat test-results.txt
        echo "SUMMARY<<EOF" >> $GITHUB_ENV
        cat test-results.txt >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Send Email Notification
      uses: dawidd6/action-send-mail@v4
      if: always() 
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: 'Postman API Test Run: ${{ job.status }}'
        to: mr.mp.shaw.1983@gmail.com
        from: Postman Automation Bot <mr.mp.shaw.1983@gmail.com>
        secure: true
        content_type: text/html
        html_body: |
          <p>Postman API Test Suite execution completed with status: <strong>${{ job.status }}</strong></p>
          
          <p><strong>DETAILED NEWMAN EXECUTION SUMMARY:</strong></p>
          <pre style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; font-family: monospace;">
          ${{ env.SUMMARY }}
          </pre>
          
          <p>Triggered by event: <strong>${{ github.event_name }}</strong> by <strong>${{ github.actor }}</strong> on branch <strong>${{ github.head_ref || github.ref_name }}</strong>.</p>
